name: rwanda_connect
description: "Rwanda Connect - Connecting the Rwandan diaspora to opportunities, community, events, and property listings."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Networking
  dio: ^5.8.0

  # Firebase
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4

  # Backend (Supabase)
  supabase_flutter: ^2.8.3

  # Code Generation Support
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Local Storage
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Connectivity
  connectivity_plus: ^6.1.3

  # Utilities
  url_launcher: ^6.3.1
  intl: ^0.20.2
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  add_2_calendar: ^3.0.1
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  share_plus: ^10.1.4

  # Social Authentication
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.4
  crypto: ^3.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # Code Generation
  build_runner: ^2.4.15
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.4

  # App Icon Generator
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.jpeg"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo.jpeg"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  # Fonts will be loaded via google_fonts package
